<html lang="en">

<head>
  <meta charset="utf-8" />
  <title><!-- ##TITLE## --></title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      font-family: sans-serif;
      background-color: #f9f9f9;
    }

    .card {
      background: white;
      padding: 2rem;
      margin-top: 2rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      max-width: 600px;
      width: 100%;
      box-sizing: border-box;
      overflow-y: auto;
      max-height: 90vh;
      transition: box-shadow 0.3s ease;
    }

    .card:hover {
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
    }

    .title {
      color: #222;
      text-align: center;
      margin-bottom: 1.5rem;
      font-size: 1.5rem;
    }

    .subpage-links {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .subpage-links a {
      display: block;
      text-align: center;
      text-decoration: none;
      color: #007bff;
      padding: 0.75rem;
      transition: all 0.3s ease;
      border-radius: 4px;
      outline: none;
    }

    .subpage-links a:hover,
    .subpage-links a:focus {
      background-color: #007bff;
      color: white;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1 class="title"><!-- ##TITLE## --></h1>
    <!-- ##CONTENT## -->
  </div>
</body>

</html>
